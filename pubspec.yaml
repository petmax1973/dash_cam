name: dash_cam
description: "Dash Cam App - Trasforma il tuo telefono in una dashcam"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.1

  # Background service
  flutter_foreground_task: ^9.2.2

  # Video playback
  video_player: ^2.9.3

  # File system
  path_provider: ^2.1.5
  path: ^1.9.1

  # Settings persistence
  shared_preferences: ^2.3.5

  # Runtime permissions
  permission_handler: ^11.3.1

  # Save to gallery
  gal: ^2.3.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.20.2
  simple_pip_mode: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#151d70"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
